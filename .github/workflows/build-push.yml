# =============================================================================
# Build & Push Pipeline — Docker images to ACR
# =============================================================================
# Triggers on push to main (after CI passes).
# Builds multi-platform Docker images and pushes to Azure Container Registry.
# =============================================================================
name: Build & Push

on:
  push:
    branches: [main]
    paths:
      - "services/**"
      - "frontend/**"
      - "docker-compose.yml"
  workflow_dispatch:
    inputs:
      service:
        description: "Service to build (or 'all')"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - api-gateway
          - user-service
          - product-service
          - cart-service
          - order-service
          - notification-service
          - frontend

permissions:
  contents: read
  id-token: write  # OIDC for Azure login

env:
  ACR_NAME: cloudcommerceacr
  ACR_LOGIN_SERVER: cloudcommerceacr.azurecr.io

jobs:
  # ===========================================================================
  # Detect Changed Services
  # ===========================================================================
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.services }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed services
        id: filter
        run: |
          if [ "${{ github.event.inputs.service }}" = "all" ] || [ -z "${{ github.event.inputs.service }}" ]; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -E '^(services/|frontend/)' | cut -d'/' -f1-2 | sort -u)
            SERVICES=()
            for path in $CHANGED; do
              case $path in
                services/api-gateway) SERVICES+=("api-gateway") ;;
                services/user-service) SERVICES+=("user-service") ;;
                services/product-service) SERVICES+=("product-service") ;;
                services/cart-service) SERVICES+=("cart-service") ;;
                services/order-service) SERVICES+=("order-service") ;;
                services/notification-service) SERVICES+=("notification-service") ;;
                frontend) SERVICES+=("frontend") ;;
              esac
            done
            JSON=$(printf '%s\n' "${SERVICES[@]}" | jq -R . | jq -s -c .)
          else
            JSON='["${{ github.event.inputs.service }}"]'
          fi
          echo "services=$JSON" >> $GITHUB_OUTPUT
          echo "Building: $JSON"

  # ===========================================================================
  # Build & Push Images
  # ===========================================================================
  build-push:
    name: Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.services != '[]'
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ACR_LOGIN_SERVER }}/${{ matrix.service }}
          tags: |
            type=sha
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Determine build context
        id: context
        run: |
          if [ "${{ matrix.service }}" = "frontend" ]; then
            echo "path=frontend" >> $GITHUB_OUTPUT
          else
            echo "path=services/${{ matrix.service }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ steps.context.outputs.path }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Run Trivy on built image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.ACR_LOGIN_SERVER }}/${{ matrix.service }}:latest"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL"
