# =============================================================================
# Deploy Pipeline — AKS via Kustomize
# =============================================================================
# Triggered after Build & Push or manually.
# Supports dev, staging, production environments with approval gates.
# =============================================================================
name: Deploy

on:
  workflow_run:
    workflows: ["Build & Push"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - staging
          - production
      image_tag:
        description: "Image tag to deploy"
        required: true
        default: "latest"

permissions:
  contents: read
  id-token: write

env:
  AKS_CLUSTER: cloudcommerce-aks
  AKS_RESOURCE_GROUP: cloudcommerce-rg

jobs:
  # ===========================================================================
  # Deploy to Dev (auto on main push)
  # ===========================================================================
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_run' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
    environment:
      name: development
      url: https://dev.cloudcommerce.example.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.AKS_RESOURCE_GROUP }}-dev
          cluster-name: ${{ env.AKS_CLUSTER }}-dev

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Deploy with Kustomize
        run: |
          cd kubernetes/overlays/dev
          kustomize edit set image \
            "cloudcommerceacr.azurecr.io/api-gateway=cloudcommercedevcr.azurecr.io/api-gateway:${{ github.sha }}" \
            "cloudcommerceacr.azurecr.io/user-service=cloudcommercedevcr.azurecr.io/user-service:${{ github.sha }}" \
            "cloudcommerceacr.azurecr.io/product-service=cloudcommercedevcr.azurecr.io/product-service:${{ github.sha }}" \
            "cloudcommerceacr.azurecr.io/cart-service=cloudcommercedevcr.azurecr.io/cart-service:${{ github.sha }}" \
            "cloudcommerceacr.azurecr.io/order-service=cloudcommercedevcr.azurecr.io/order-service:${{ github.sha }}" \
            "cloudcommerceacr.azurecr.io/notification-service=cloudcommercedevcr.azurecr.io/notification-service:${{ github.sha }}" \
            "cloudcommerceacr.azurecr.io/frontend=cloudcommercedevcr.azurecr.io/frontend:${{ github.sha }}"
          kustomize build . | kubectl apply -f -

      - name: Verify rollout
        run: |
          for svc in api-gateway user-service product-service cart-service order-service notification-service frontend; do
            kubectl rollout status deployment/dev-${svc} -n cloudcommerce-dev --timeout=300s
          done

  # ===========================================================================
  # Deploy to Staging (manual trigger with approval)
  # ===========================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.event.inputs.environment == 'staging'
    needs: []
    environment:
      name: staging
      url: https://staging.cloudcommerce.example.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.AKS_RESOURCE_GROUP }}-staging
          cluster-name: ${{ env.AKS_CLUSTER }}-staging

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Deploy with Kustomize
        run: |
          cd kubernetes/overlays/staging
          kustomize edit set image \
            "cloudcommerceacr.azurecr.io/*=cloudcommercestgcr.azurecr.io/*:${{ github.event.inputs.image_tag }}"
          kustomize build . | kubectl apply -f -

      - name: Verify rollout
        run: |
          for svc in api-gateway user-service product-service cart-service order-service notification-service frontend; do
            kubectl rollout status deployment/stg-${svc} -n cloudcommerce-staging --timeout=300s
          done

      - name: Run smoke tests
        run: |
          STAGING_URL="https://staging.cloudcommerce.example.com"
          for endpoint in "/api/health" "/api/products" "/"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${STAGING_URL}${endpoint}")
            if [ "$STATUS" -ne 200 ]; then
              echo "FAILED: ${endpoint} returned ${STATUS}"
              exit 1
            fi
            echo "OK: ${endpoint} returned ${STATUS}"
          done

  # ===========================================================================
  # Deploy to Production (manual trigger + environment approval gate)
  # ===========================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.event.inputs.environment == 'production'
    needs: []
    environment:
      name: production
      url: https://cloudcommerce.example.com
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.AKS_RESOURCE_GROUP }}-prod
          cluster-name: ${{ env.AKS_CLUSTER }}-prod

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Deploy with Kustomize (rolling update)
        run: |
          cd kubernetes/overlays/production
          kustomize edit set image \
            "cloudcommerceacr.azurecr.io/*:${{ github.event.inputs.image_tag }}"
          kustomize build . | kubectl apply -f -

      - name: Verify rollout
        run: |
          for svc in api-gateway user-service product-service cart-service order-service notification-service frontend; do
            kubectl rollout status deployment/prod-${svc} -n cloudcommerce-prod --timeout=600s
          done

      - name: Post-deploy health check
        run: |
          PROD_URL="https://cloudcommerce.example.com"
          sleep 30
          for endpoint in "/api/health" "/api/products" "/"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${PROD_URL}${endpoint}")
            if [ "$STATUS" -ne 200 ]; then
              echo "CRITICAL: ${endpoint} returned ${STATUS} — Initiating rollback!"
              for svc in api-gateway user-service product-service cart-service order-service notification-service frontend; do
                kubectl rollout undo deployment/prod-${svc} -n cloudcommerce-prod
              done
              exit 1
            fi
            echo "OK: ${endpoint} returned ${STATUS}"
          done

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Production deployment of tag ${{ github.event.inputs.image_tag }} completed successfully."
