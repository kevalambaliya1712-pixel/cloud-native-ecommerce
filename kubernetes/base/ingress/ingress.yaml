# =============================================================================
# Azure Application Gateway Ingress Controller (AGIC) Configuration
# =============================================================================
# Routes traffic from the Application Gateway to the frontend and API gateway.
# TLS termination occurs at the Application Gateway level.
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cloudcommerce-ingress
  namespace: cloudcommerce
  annotations:
    kubernetes.io/ingress.class: azure/application-gateway
    appgw.ingress.kubernetes.io/ssl-redirect: "true"
    appgw.ingress.kubernetes.io/use-private-ip: "false"
    appgw.ingress.kubernetes.io/connection-draining: "true"
    appgw.ingress.kubernetes.io/connection-draining-timeout: "30"
    appgw.ingress.kubernetes.io/cookie-based-affinity: "false"
    appgw.ingress.kubernetes.io/request-timeout: "60"
    appgw.ingress.kubernetes.io/backend-protocol: "http"
    appgw.ingress.kubernetes.io/waf-policy-for-path: "/subscriptions/SUBSCRIPTION_ID/resourceGroups/RG/providers/Microsoft.Network/ApplicationGatewayWebApplicationFirewallPolicies/cloudcommerce-waf"
spec:
  tls:
    - hosts:
        - cloudcommerce.example.com
      secretName: cloudcommerce-tls
  rules:
    - host: cloudcommerce.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
