# =============================================================================
# Prometheus Configuration — Metrics Collection
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: cloudcommerce
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      scrape_timeout: 10s

    rule_files:
      - "/etc/prometheus/alert-rules.yml"

    alerting:
      alertmanagers:
        - static_configs:
            - targets: ["alertmanager:9093"]

    scrape_configs:
      # Kubernetes service discovery
      - job_name: "kubernetes-pods"
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ["cloudcommerce"]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: replace
            target_label: service

      # API Gateway metrics
      - job_name: "api-gateway"
        static_configs:
          - targets: ["api-gateway.cloudcommerce.svc:3000"]
        metrics_path: /metrics

      # Individual service metrics
      - job_name: "user-service"
        static_configs:
          - targets: ["user-service.cloudcommerce.svc:3001"]
        metrics_path: /metrics

      - job_name: "product-service"
        static_configs:
          - targets: ["product-service.cloudcommerce.svc:3002"]
        metrics_path: /metrics

      - job_name: "cart-service"
        static_configs:
          - targets: ["cart-service.cloudcommerce.svc:3003"]
        metrics_path: /metrics

      - job_name: "order-service"
        static_configs:
          - targets: ["order-service.cloudcommerce.svc:3004"]
        metrics_path: /metrics

      - job_name: "notification-service"
        static_configs:
          - targets: ["notification-service.cloudcommerce.svc:3005"]
        metrics_path: /metrics

      # Node Exporter
      - job_name: "node-exporter"
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)

  alert-rules.yml: |
    groups:
      - name: cloudcommerce-alerts
        rules:
          # High error rate (> 5% of requests returning 5xx)
          - alert: HighErrorRate
            expr: |
              sum(rate(http_requests_total{status=~"5.."}[5m])) by (service)
              /
              sum(rate(http_requests_total[5m])) by (service)
              > 0.05
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "High error rate on {{ $labels.service }}"
              description: "{{ $labels.service }} has error rate of {{ $value | humanizePercentage }}"

          # High latency (p99 > 2s)
          - alert: HighLatency
            expr: |
              histogram_quantile(0.99,
                sum(rate(http_request_duration_seconds_bucket[5m])) by (le, service)
              ) > 2
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High p99 latency on {{ $labels.service }}"
              description: "{{ $labels.service }} p99 latency is {{ $value }}s"

          # Pod not ready
          - alert: PodNotReady
            expr: kube_pod_status_ready{namespace="cloudcommerce", condition="true"} == 0
            for: 3m
            labels:
              severity: critical
            annotations:
              summary: "Pod {{ $labels.pod }} not ready"

          # High memory usage (> 85%)
          - alert: HighMemoryUsage
            expr: |
              container_memory_working_set_bytes{namespace="cloudcommerce"}
              /
              container_spec_memory_limit_bytes{namespace="cloudcommerce"}
              > 0.85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High memory usage in {{ $labels.container }}"

          # HPA at max replicas
          - alert: HPAMaxedOut
            expr: |
              kube_horizontalpodautoscaler_status_current_replicas{namespace="cloudcommerce"}
              ==
              kube_horizontalpodautoscaler_spec_max_replicas{namespace="cloudcommerce"}
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "HPA {{ $labels.horizontalpodautoscaler }} at max replicas"
---
# Prometheus Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: cloudcommerce
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: cloudcommerce-sa
      containers:
        - name: prometheus
          image: prom/prometheus:v2.50.0
          ports:
            - containerPort: 9090
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=15d"
            - "--web.enable-lifecycle"
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: storage
              mountPath: /prometheus
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: storage
          persistentVolumeClaim:
            claimName: prometheus-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: cloudcommerce
spec:
  type: ClusterIP
  ports:
    - port: 9090
      targetPort: 9090
  selector:
    app: prometheus
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-pvc
  namespace: cloudcommerce
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: managed-premium
  resources:
    requests:
      storage: 50Gi
