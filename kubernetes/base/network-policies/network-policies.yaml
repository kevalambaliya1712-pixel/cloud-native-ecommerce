# =============================================================================
# Network Policies — Zero Trust Microsegmentation
# =============================================================================
# Default: Deny all ingress/egress traffic in the namespace.
# Then selectively allow only required communication paths.
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: cloudcommerce
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Allow DNS resolution for all pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: cloudcommerce
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# Frontend: Allow ingress from Ingress controller, egress to API Gateway
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-policy
  namespace: cloudcommerce
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
    - Ingress
  ingress:
    - from: []
      ports:
        - port: 80
---
# API Gateway: Allow ingress from Ingress, egress to all backend services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-gateway-policy
  namespace: cloudcommerce
spec:
  podSelector:
    matchLabels:
      app: api-gateway
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from: []
      ports:
        - port: 3000
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: user-service
      ports:
        - port: 3001
    - to:
        - podSelector:
            matchLabels:
              app: product-service
      ports:
        - port: 3002
    - to:
        - podSelector:
            matchLabels:
              app: cart-service
      ports:
        - port: 3003
    - to:
        - podSelector:
            matchLabels:
              app: order-service
      ports:
        - port: 3004
    - to:
        - podSelector:
            matchLabels:
              app: notification-service
      ports:
        - port: 3005
---
# User Service: Only accept from API Gateway
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: user-service-policy
  namespace: cloudcommerce
spec:
  podSelector:
    matchLabels:
      app: user-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
      ports:
        - port: 3001
  egress:
    - to: []
      ports:
        - port: 1433   # Azure SQL
        - port: 443    # Azure Key Vault, AAD
---
# Product Service: Only accept from API Gateway
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: product-service-policy
  namespace: cloudcommerce
spec:
  podSelector:
    matchLabels:
      app: product-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
      ports:
        - port: 3002
  egress:
    - to: []
      ports:
        - port: 1433
        - port: 443
---
# Cart Service: Accept from API Gateway
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cart-service-policy
  namespace: cloudcommerce
spec:
  podSelector:
    matchLabels:
      app: cart-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
      ports:
        - port: 3003
  egress:
    - to: []
      ports:
        - port: 1433
        - port: 443
---
# Order Service: Accept from API Gateway, egress to notification-service + DB
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: order-service-policy
  namespace: cloudcommerce
spec:
  podSelector:
    matchLabels:
      app: order-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
      ports:
        - port: 3004
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: notification-service
      ports:
        - port: 3005
    - to: []
      ports:
        - port: 1433
        - port: 443
---
# Notification Service: Accept from API Gateway + Order Service
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: notification-service-policy
  namespace: cloudcommerce
spec:
  podSelector:
    matchLabels:
      app: notification-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
        - podSelector:
            matchLabels:
              app: order-service
      ports:
        - port: 3005
  egress:
    - to: []
      ports:
        - port: 443  # SMTP relay, Azure services
        - port: 587  # SMTP
