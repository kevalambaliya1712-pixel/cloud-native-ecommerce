# =============================================================================
# Azure Key Vault SecretProviderClass for AKS CSI Driver
# =============================================================================
# Mounts secrets from Azure Key Vault into pods as volume-mounted files
# or synced Kubernetes secrets. Requires:
#   - Azure Key Vault Provider for Secrets Store CSI Driver (AKS add-on)
#   - Managed Identity with Key Vault access policy
# =============================================================================
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: azure-kv-secrets
  namespace: cloudcommerce
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: ""  # Set via Kustomize overlay per environment
    keyvaultName: ""            # Set via Kustomize overlay per environment
    cloudName: "AzurePublicCloud"
    objects: |
      array:
        - |
          objectName: jwt-signing-key
          objectType: secret
          objectAlias: JWT_SECRET
        - |
          objectName: sql-connection-users
          objectType: secret
          objectAlias: USERS_DB_URL
        - |
          objectName: sql-connection-products
          objectType: secret
          objectAlias: PRODUCTS_DB_URL
        - |
          objectName: sql-connection-carts
          objectType: secret
          objectAlias: CARTS_DB_URL
        - |
          objectName: sql-connection-orders
          objectType: secret
          objectAlias: ORDERS_DB_URL
        - |
          objectName: gemini-api-key
          objectType: secret
          objectAlias: GEMINI_API_KEY
    tenantId: ""  # Set via Kustomize overlay per environment
  secretObjects:
    - secretName: cloudcommerce-secrets
      type: Opaque
      data:
        - objectName: JWT_SECRET
          key: JWT_SECRET
        - objectName: USERS_DB_URL
          key: USERS_DB_URL
        - objectName: PRODUCTS_DB_URL
          key: PRODUCTS_DB_URL
        - objectName: CARTS_DB_URL
          key: CARTS_DB_URL
        - objectName: ORDERS_DB_URL
          key: ORDERS_DB_URL
        - objectName: GEMINI_API_KEY
          key: GEMINI_API_KEY
