apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service
  namespace: cloudcommerce
  labels:
    app: cart-service
    app.kubernetes.io/part-of: cloudcommerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cart-service
  template:
    metadata:
      labels:
        app: cart-service
        app.kubernetes.io/part-of: cloudcommerce
    spec:
      serviceAccountName: cloudcommerce-sa
      containers:
        - name: cart-service
          image: cloudcommerceacr.azurecr.io/cart-service:latest
          ports:
            - containerPort: 3003
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: PORT
              value: "3003"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: cloudcommerce-secrets
                  key: CARTS_DB_URL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: cart-service
  namespace: cloudcommerce
spec:
  type: ClusterIP
  ports:
    - port: 3003
      targetPort: 3003
      protocol: TCP
      name: http
  selector:
    app: cart-service
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cart-service-hpa
  namespace: cloudcommerce
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cart-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: cart-service-pdb
  namespace: cloudcommerce
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: cart-service
