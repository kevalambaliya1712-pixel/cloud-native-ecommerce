apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: cloudcommerce
  labels:
    app: user-service
    app.kubernetes.io/part-of: cloudcommerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
        app.kubernetes.io/part-of: cloudcommerce
    spec:
      serviceAccountName: cloudcommerce-sa
      containers:
        - name: user-service
          image: kevalacr123.azurecr.io/user-service:v1
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: PORT
              value: "3001"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: cloudcommerce-secrets
                  key: USERS_DB_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: cloudcommerce-secrets
                  key: JWT_SECRET
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
