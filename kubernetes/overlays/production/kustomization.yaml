apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cloudcommerce-prod

resources:
  - ../../base

commonLabels:
  environment: production

# Production: Higher replicas and resource limits
patches:
  - target:
      kind: Deployment
      name: api-gateway
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 250m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 256Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 1Gi
  - target:
      kind: Deployment
      name: order-service
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 250m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 512Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 1Gi
  - target:
      kind: HorizontalPodAutoscaler
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 3
  # Anti-affinity for HA
  - target:
      kind: Deployment
    patch: |
      - op: add
        path: /spec/template/spec/affinity
        value:
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  labelSelector:
                    matchExpressions:
                      - key: app.kubernetes.io/part-of
                        operator: In
                        values:
                          - cloudcommerce
                  topologyKey: kubernetes.io/hostname
  - target:
      kind: SecretProviderClass
      name: azure-kv-secrets
    patch: |
      - op: replace
        path: /spec/parameters/keyvaultName
        value: kv-cloudcommerce-prod

configMapGenerator:
  - name: app-config
    behavior: merge
    literals:
      - NODE_ENV=production
      - CORS_ORIGIN=https://cloudcommerce.example.com

images:
  - name: cloudcommerceacr.azurecr.io/api-gateway
    newTag: "1.0.0"
  - name: cloudcommerceacr.azurecr.io/user-service
    newTag: "1.0.0"
  - name: cloudcommerceacr.azurecr.io/product-service
    newTag: "1.0.0"
  - name: cloudcommerceacr.azurecr.io/cart-service
    newTag: "1.0.0"
  - name: cloudcommerceacr.azurecr.io/order-service
    newTag: "1.0.0"
  - name: cloudcommerceacr.azurecr.io/notification-service
    newTag: "1.0.0"
  - name: cloudcommerceacr.azurecr.io/frontend
    newTag: "1.0.0"
